<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoryAI · Legal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Roboto", sans-serif;
      background: #0B0820;
      color: #F8FAFC;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: linear-gradient(135deg, #6D28D9 0%, #EC4899 60%, #06B6D4 100%);
      padding: 40px 32px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(109, 40, 217, 0.35);
    }
    h1 { font-size: 28px; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.02em; }
    p { opacity: 0.92; margin: 0 0 28px; font-size: 15px; }
    .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: white;
      padding: 10px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      backdrop-filter: blur(8px);
      transition: background 0.15s;
    }
    a:hover { background: rgba(255, 255, 255, 0.22); }
  </style>
</head>
<body>
  <div class="card">
    <h1>StoryAI</h1>
    <p>Bạn chọn. AI dệt truyện.</p>
    <div class="links">
      <a href="./privacy.html">Chính sách bảo mật</a>
      <a href="./support.html">Hỗ trợ</a>
    </div>
  </div>
</body>
</html>
